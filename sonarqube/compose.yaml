services:
  sonarqube:
    image: ghcr.io/chris-arsenault/sonarqube:${IMAGE_TAG}
    container_name: sonarqube
    restart: unless-stopped
    ports:
      - "30090:9000"
    environment:
      SONAR_JDBC_URL: "jdbc:postgresql://192.168.66.3:5432/sonarqube"
      SONAR_JDBC_USERNAME: "${SONAR_DB_USER}"
      SONAR_JDBC_PASSWORD: "${SONAR_DB_PASSWORD}"
      SONAR_CORE_SERVERBASEURL: "https://sonar.ahara.io"
      SONAR_AUTH_OIDC_ENABLED: "true"
      SONAR_AUTH_OIDC_LOGINSTRATEGY: "Custom claim"
      SONAR_AUTH_OIDC_LOGINSTRATEGY_CUSTOMCLAIM_NAME: "cognito:username"
      SONAR_AUTH_OIDC_ISSUERURI: "${SONAR_OIDC_ISSUER}"
      SONAR_AUTH_OIDC_CLIENTID_SECURED: "${SONAR_OIDC_CLIENT_ID}"
      SONAR_AUTH_OIDC_CLIENTSECRET_SECURED: "${SONAR_OIDC_CLIENT_SECRET}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 131072
        hard: 131072

  bootstrap:
    image: curlimages/curl:latest
    depends_on:
      sonarqube:
        condition: service_healthy
    restart: "no"
    environment:
      SONAR_ADMIN_PASSWORD: "${SONAR_ADMIN_PASSWORD}"
      SONAR_SCANNER_PASSWORD: "${SONAR_SCANNER_PASSWORD}"
    entrypoint: ["sh", "-c"]
    command:
      - |
        API="http://sonarqube:9000/api"
        RESP=$$(mktemp)

        # --- Change default admin password ---
        HTTP_CODE=$$(curl -s -o "$$RESP" -w '%{http_code}' \
          -u admin:admin \
          -X POST "$${API}/users/change_password" \
          --data-urlencode "login=admin" \
          --data-urlencode "previousPassword=admin" \
          --data-urlencode "password=$${SONAR_ADMIN_PASSWORD}")
        case "$$HTTP_CODE" in
          204) echo "Admin password set from SSM" ;;
          401) echo "Admin password already changed, skipping" ;;
          *)   echo "WARNING: admin password change HTTP $$HTTP_CODE"; cat "$$RESP"; echo; exit 1 ;;
        esac

        AUTH="admin:$${SONAR_ADMIN_PASSWORD}"

        # --- Create scanner user (ignore if exists) ---
        HTTP_CODE=$$(curl -s -o "$$RESP" -w '%{http_code}' \
          -u "$$AUTH" \
          -X POST "$${API}/users/create" \
          --data-urlencode "login=scanner" \
          --data-urlencode "name=CI Scanner" \
          --data-urlencode "password=$${SONAR_SCANNER_PASSWORD}" \
          --data-urlencode "local=true")
        case "$$HTTP_CODE" in
          200) echo "Scanner user created" ;;
          400) echo "Scanner user already exists" ;;
          *)   echo "WARNING: scanner user create HTTP $$HTTP_CODE"; cat "$$RESP"; echo; exit 1 ;;
        esac

        # --- Grant scanner global permissions ---
        for PERM in scan provisioning; do
          HTTP_CODE=$$(curl -s -o "$$RESP" -w '%{http_code}' \
            -u "$$AUTH" \
            -X POST "$${API}/permissions/add_user" \
            --data-urlencode "login=scanner" \
            --data-urlencode "permission=$$PERM")
          case "$$HTTP_CODE" in
            204) echo "Granted $$PERM to scanner" ;;
            *)   echo "WARNING: grant $$PERM HTTP $$HTTP_CODE"; cat "$$RESP"; echo; exit 1 ;;
          esac
        done

        rm -f "$$RESP"
        echo "Bootstrap complete"

volumes:
  sonarqube_data:
  sonarqube_logs:
