services:
  sonarqube:
    image: ghcr.io/chris-arsenault/sonarqube:${IMAGE_TAG}
    container_name: sonarqube
    restart: unless-stopped
    ports:
      - "30090:9000"
    environment:
      SONAR_JDBC_URL: "jdbc:postgresql://192.168.66.3:5432/sonarqube"
      SONAR_JDBC_USERNAME: "${SONAR_DB_USER}"
      SONAR_JDBC_PASSWORD: "${SONAR_DB_PASSWORD}"
      SONAR_WEB_SYSTEMPASSCODE: "${SONAR_ADMIN_PASSCODE}"
      SONAR_WEB_SERVERBASEURL: "https://sonar.ahara.io"
      SONAR_AUTH_OIDC_ENABLED: "true"
      SONAR_AUTH_OIDC_ISSUERURI: "${SONAR_OIDC_ISSUER}"
      SONAR_AUTH_OIDC_CLIENTID_SECURED: "${SONAR_OIDC_CLIENT_ID}"
      SONAR_AUTH_OIDC_CLIENTSECRET_SECURED: "${SONAR_OIDC_CLIENT_SECRET}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 131072
        hard: 131072

  bootstrap:
    image: curlimages/curl:latest
    depends_on:
      sonarqube:
        condition: service_healthy
    restart: "no"
    environment:
      SONAR_ADMIN_PASSCODE: "${SONAR_ADMIN_PASSCODE}"
      SONAR_ADMIN_PASSWORD: "${SONAR_ADMIN_PASSWORD}"
    entrypoint: ["sh", "-c"]
    command:
      - |
        API="http://sonarqube:9000/api"

        # Change default admin password to the SSM-managed password
        HTTP_CODE=$$(curl -s -o /dev/null -w '%{http_code}' \
          -u admin:admin \
          -X POST "$${API}/users/change_password" \
          -d "login=admin&previousPassword=admin&password=$${SONAR_ADMIN_PASSWORD}")
        case "$$HTTP_CODE" in
          204) echo "Admin password set from SSM" ;;
          401) echo "Admin password already changed, skipping" ;;
          *)   echo "WARNING: Admin password change returned HTTP $$HTTP_CODE"; exit 1 ;;
        esac

volumes:
  sonarqube_data:
  sonarqube_logs:
