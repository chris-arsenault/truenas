name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - "sonarqube/**"
      - "infrastructure/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "sonarqube/**"
      - "infrastructure/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.ref == 'refs/heads/main' && 'truenas-deploy' || format('truenas-{0}', github.ref) }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: hashicorp/setup-terraform@v4

      - name: Terraform fmt
        run: terraform fmt -check -recursive infrastructure/terraform/

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1

      - uses: chris-arsenault/platform/.github/actions/sonar-scan@main
        with:
          project-key: truenas
          sources: infrastructure/terraform,sonarqube
          exclusions: "**/.terraform/**"

      - name: Terraform deploy
        if: github.ref == 'refs/heads/main'
        env:
          STATE_BUCKET: ${{ secrets.STATE_BUCKET }}
        run: |
          terraform -chdir=infrastructure/terraform init -reconfigure \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="region=us-east-1" \
            -backend-config="use_lockfile=true"
          terraform -chdir=infrastructure/terraform apply -auto-approve

      - name: Build SonarQube image
        run: |
          docker build \
            -t ghcr.io/chris-arsenault/sonarqube:${{ github.sha }} \
            -t ghcr.io/chris-arsenault/sonarqube:latest \
            sonarqube/

      # TODO: Re-enable secret-scan once upstream SonarQube false positives are resolved
      # - uses: chris-arsenault/platform/.github/actions/secret-scan@main
      #   with:
      #     image: ghcr.io/chris-arsenault/sonarqube:${{ github.sha }}

      - name: Push to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/chris-arsenault/sonarqube:${{ github.sha }}
          docker push ghcr.io/chris-arsenault/sonarqube:latest

      - uses: chris-arsenault/platform/.github/actions/deploy-truenas@main
        if: github.ref == 'refs/heads/main'
        with:
          stack-name: sonarqube
          repo: chris-arsenault/truenas
          compose-path: sonarqube/compose.yaml
          image-tag: ${{ github.sha }}
          secrets: |
            SONAR_DB_USER=/platform/truenas-db/sonarqube/username
            SONAR_DB_PASSWORD=/platform/truenas-db/sonarqube/password
            SONAR_ADMIN_PASSCODE=/platform/sonarqube/admin-passcode
            SONAR_ADMIN_PASSWORD=/platform/sonarqube/admin-password
            SONAR_OIDC_ISSUER=/platform/cognito/issuer-url
            SONAR_OIDC_CLIENT_ID=/platform/sonarqube/cognito-client-id
            SONAR_OIDC_CLIENT_SECRET=/platform/sonarqube/cognito-client-secret

      - name: Bootstrap SonarQube CI token
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          REGION="us-east-1"
          FN=$(aws ssm get-parameter --name /platform/komodo/function-name \
            --query Parameter.Value --output text --region "${REGION}")

          # Wait for SonarQube to be healthy
          echo "Waiting for SonarQube to be healthy..."
          for i in $(seq 1 40); do
            RESULT_FILE=$(mktemp)
            aws lambda invoke \
              --function-name "${FN}" \
              --payload '{"actions":[{"type":"HttpCall","url":"http://192.168.66.3:30090/api/system/status","method":"GET","headers":{},"form":{}}]}' \
              --cli-binary-format raw-in-base64-out \
              --region "${REGION}" \
              "${RESULT_FILE}" > /dev/null
            RESULT=$(cat "${RESULT_FILE}"); rm "${RESULT_FILE}"
            if echo "${RESULT}" | python3 -c "
              import sys, json
              data = json.load(sys.stdin)
              r = data.get('results', [{}])[0]
              body = r.get('body', {}).get('body', {})
              if isinstance(body, str):
                  body = json.loads(body)
              if body.get('status') == 'UP':
                  sys.exit(0)
              sys.exit(1)
            " 2>/dev/null; then
              echo "SonarQube is UP"
              break
            fi
            echo "  attempt ${i}/40, waiting 15s..."
            sleep 15
          done

          # Revoke existing CI token (ignore errors)
          aws lambda invoke \
            --function-name "${FN}" \
            --payload "$(python3 -c "
          import json
          print(json.dumps({'actions': [{'type': 'HttpCall', 'url': 'http://192.168.66.3:30090/api/user_tokens/revoke', 'method': 'POST', 'headers': {'Authorization': 'ssm:/platform/sonarqube/admin-basic-auth'}, 'form': {'login': 'admin', 'name': 'ci'}}]}))
          ")" \
            --cli-binary-format raw-in-base64-out \
            --region "${REGION}" \
            /dev/null > /dev/null 2>&1 || true

          # Generate new CI token
          RESULT_FILE=$(mktemp)
          aws lambda invoke \
            --function-name "${FN}" \
            --payload "$(python3 -c "
          import json
          print(json.dumps({'actions': [{'type': 'HttpCall', 'url': 'http://192.168.66.3:30090/api/user_tokens/generate', 'method': 'POST', 'headers': {'Authorization': 'ssm:/platform/sonarqube/admin-basic-auth'}, 'form': {'login': 'admin', 'name': 'ci', 'type': 'GLOBAL_ANALYSIS_TOKEN'}}]}))
          ")" \
            --cli-binary-format raw-in-base64-out \
            --region "${REGION}" \
            "${RESULT_FILE}" > /dev/null
          RESULT=$(cat "${RESULT_FILE}"); rm "${RESULT_FILE}"

          TOKEN=$(echo "${RESULT}" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          r = data.get('results', [{}])[0]
          if not r.get('success'):
              print(r.get('error', 'unknown error'), file=sys.stderr)
              sys.exit(1)
          body = r.get('body', {}).get('body', {})
          if isinstance(body, str):
              body = json.loads(body)
          print(body.get('token', ''), end='')
          ")

          if [ -z "${TOKEN}" ]; then
            echo "::error::Failed to generate SonarQube CI token"
            echo "${RESULT}" | python3 -m json.tool 2>/dev/null || echo "${RESULT}"
            exit 1
          fi

          echo "::add-mask::${TOKEN}"
          aws ssm put-parameter \
            --name /platform/sonarqube/ci-token \
            --type SecureString \
            --value "${TOKEN}" \
            --overwrite \
            --region "${REGION}"
          echo "CI token stored in SSM"
        shell: bash

  report:
    if: always()
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1
      - uses: chris-arsenault/platform/.github/actions/report-build@main
        with:
          status: ${{ needs.ci.result }}
          lint-passed: ${{ needs.ci.result == 'success' }}
