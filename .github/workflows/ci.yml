name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  ci:
    uses: chris-arsenault/platform/.github/workflows/ci.yml@main
    secrets: inherit

  bootstrap:
    if: github.ref == 'refs/heads/main'
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1

      - name: Create SonarQube CI token
        run: |
          set -euo pipefail
          REGION="us-east-1"
          FN=$(aws ssm get-parameter --name /platform/sonarqube/ci-token-function-name \
            --query Parameter.Value --output text --region "${REGION}")

          echo "Creating SonarQube CI token..."
          RESULT_FILE=$(mktemp)
          AWS_MAX_ATTEMPTS=1 aws lambda invoke \
            --function-name "${FN}" \
            --payload '{"action":"create-ci-token"}' \
            --cli-binary-format raw-in-base64-out \
            --cli-read-timeout 700 \
            --region "${REGION}" \
            "${RESULT_FILE}" > /dev/null

          RESULT=$(cat "${RESULT_FILE}"); rm "${RESULT_FILE}"

          if echo "${RESULT}" | grep -q '"success":true'; then
            echo "CI token created and stored in SSM"
          else
            echo "::error::SonarQube CI token creation failed"
            echo "${RESULT}" | python3 -m json.tool 2>/dev/null || echo "${RESULT}"
            exit 1
          fi
