name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - "sonarqube/**"
      - "infrastructure/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "sonarqube/**"
      - "infrastructure/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  CARGO_HOME: /home/runner/.cargo

jobs:
  ci:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.ref == 'refs/heads/main' && 'truenas-deploy' || format('truenas-{0}', github.ref) }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: hashicorp/setup-terraform@v4

      - name: Rust version key
        id: rust
        run: echo "cachekey=$(rustc --version | sha256sum | head -c12)" >> "$GITHUB_OUTPUT"

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sonarqube/bootstrap/target
          key: rust-${{ steps.rust.outputs.cachekey }}-${{ hashFiles('sonarqube/bootstrap/Cargo.lock') }}
          restore-keys: rust-${{ steps.rust.outputs.cachekey }}-

      - name: Terraform fmt
        run: terraform fmt -check -recursive infrastructure/terraform/

      - name: Clippy
        working-directory: sonarqube/bootstrap
        run: cargo clippy -- -D warnings

      - name: Rustfmt
        working-directory: sonarqube/bootstrap
        run: cargo fmt -- --check

      - name: Install cargo-lambda
        if: github.ref == 'refs/heads/main'
        run: pip3 install cargo-lambda

      - name: Build bootstrap Lambda
        if: github.ref == 'refs/heads/main'
        working-directory: sonarqube/bootstrap
        run: cargo lambda build --release

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1

      - uses: chris-arsenault/platform/.github/actions/sonar-scan@main
        with:
          project-key: truenas
          sources: infrastructure/terraform,sonarqube
          exclusions: "**/.terraform/**,**/target/**"

      - name: Terraform deploy
        if: github.ref == 'refs/heads/main'
        env:
          STATE_BUCKET: ${{ secrets.STATE_BUCKET }}
        run: |
          terraform -chdir=infrastructure/terraform init -reconfigure \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="region=us-east-1" \
            -backend-config="use_lockfile=true"
          terraform -chdir=infrastructure/terraform apply -auto-approve

      - name: Build SonarQube image
        run: |
          docker build \
            -t ghcr.io/chris-arsenault/sonarqube:${{ github.sha }} \
            -t ghcr.io/chris-arsenault/sonarqube:latest \
            sonarqube/

      # TODO: Re-enable secret-scan once upstream SonarQube false positives are resolved
      # - uses: chris-arsenault/platform/.github/actions/secret-scan@main
      #   with:
      #     image: ghcr.io/chris-arsenault/sonarqube:${{ github.sha }}

      - name: Push to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/chris-arsenault/sonarqube:${{ github.sha }}
          docker push ghcr.io/chris-arsenault/sonarqube:latest

      - uses: chris-arsenault/platform/.github/actions/deploy-truenas@main
        if: github.ref == 'refs/heads/main'
        with:
          stack-name: sonarqube
          repo: chris-arsenault/truenas
          compose-path: sonarqube/compose.yaml
          image-tag: ${{ github.sha }}
          secrets: |
            SONAR_DB_USER=/platform/truenas-db/sonarqube/username
            SONAR_DB_PASSWORD=/platform/truenas-db/sonarqube/password
            SONAR_ADMIN_PASSCODE=/platform/sonarqube/admin-passcode
            SONAR_ADMIN_PASSWORD=/platform/sonarqube/admin-password
            SONAR_OIDC_ISSUER=/platform/cognito/issuer-url
            SONAR_OIDC_CLIENT_ID=/platform/sonarqube/cognito-client-id
            SONAR_OIDC_CLIENT_SECRET=/platform/sonarqube/cognito-client-secret

      - name: Bootstrap SonarQube CI token
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          REGION="us-east-1"
          FN=$(aws ssm get-parameter --name /platform/sonarqube/bootstrap-function-name \
            --query Parameter.Value --output text --region "${REGION}")

          echo "Bootstrapping SonarQube CI token..."
          RESULT_FILE=$(mktemp)
          AWS_MAX_ATTEMPTS=1 aws lambda invoke \
            --function-name "${FN}" \
            --payload '{"action":"create-ci-token"}' \
            --cli-binary-format raw-in-base64-out \
            --cli-read-timeout 700 \
            --region "${REGION}" \
            "${RESULT_FILE}" > /dev/null

          RESULT=$(cat "${RESULT_FILE}"); rm "${RESULT_FILE}"

          if echo "${RESULT}" | grep -q '"success":true'; then
            echo "CI token created and stored in SSM"
          else
            echo "::error::SonarQube bootstrap failed"
            echo "${RESULT}" | python3 -m json.tool 2>/dev/null || echo "${RESULT}"
            exit 1
          fi
        shell: bash

  report:
    if: always()
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1
      - uses: chris-arsenault/platform/.github/actions/report-build@main
        with:
          status: ${{ needs.ci.result }}
          lint-passed: ${{ needs.ci.result == 'success' }}
