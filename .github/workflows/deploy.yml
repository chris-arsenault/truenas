name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: truenas-deploy
  cancel-in-progress: false

jobs:
  deploy-sonarqube:
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' || contains(join(github.event.commits.*.modified, ','), 'docker/sonarqube/')
    steps:
      - uses: actions/checkout@v4
      - name: Deploy SonarQube
        run: bash scripts/deploy-sonarqube.sh

  deploy-terraform:
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' || contains(join(github.event.commits.*.modified, ','), 'infrastructure/terraform/')
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
      - name: Deploy Terraform
        env:
          TF_VAR_truenas_api_key: ${{ secrets.TRUENAS_API_KEY }}
          TF_VAR_truenas_base_url: ${{ secrets.TRUENAS_BASE_URL }}
        run: bash scripts/deploy-terraform.sh
